# .github/workflows/shift-left-gate.yml
name: 🛡️ Shift-Left Sustainability Gate

on:
  pull_request:
    branches: [main]

jobs:
  sustainability-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run Sustainability Gate
        run: python devops/sustainability_gate.py